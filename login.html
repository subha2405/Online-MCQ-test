<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online MCQ Test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-panel">
      <div>
        <p class="eyebrow">Demoproject</p>
        <h1>Online MCQ Test</h1>
        <p class="muted">Login to begin the MCQ test.</p>
      </div>

      <form id="loginForm" class="form-card">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Username" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Password" autocomplete="current-password" required>

        <button type="submit">Login</button>
      </form>
    </section>
  </main>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function (event) {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (username === "admin" && password === "86108") {
        localStorage.setItem("quizUser", username);
        window.location.href = "quiz.html";
      } else {
        alert("Invalid Login");
      }
    });
  </script>
</body>
</html>
